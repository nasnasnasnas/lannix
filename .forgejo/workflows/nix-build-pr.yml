name: nix-build-pr

on:
  pull_request:

concurrency:
  group: nix-build-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  ATTIC_ENDPOINT: "https://attic.szpunar.cloud/"
  ATTIC_CACHE: "lannix"

jobs:
  build:
    runs-on: native
    timeout-minutes: 360
    defaults:
      run:
        shell: bash
    steps:
      - name: Configure Nix GitHub auth
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          # Write the GitHub token to a temp nix.conf that only eval reads
          # via NIX_USER_CONF_FILES. The secret is gone when the job ends and
          # never lands in the persistent runner HOME.
          : "${RUNNER_TEMP:=$HOME/.cache/runner-tmp}"
          mkdir -p "$RUNNER_TEMP"
          NIX_CONF="$RUNNER_TEMP/nix.conf"
          (umask 077; : > "$NIX_CONF")
          if [ -n "${GH_TOKEN:-}" ]; then
            printf 'access-tokens = github.com=%s\n' "$GH_TOKEN" > "$NIX_CONF"
          fi
          chmod 600 "$NIX_CONF"
          echo "NIX_USER_CONF_FILES=$NIX_CONF" >> "$GITHUB_ENV"

      - name: Checkout repository
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory '*'
          git clone "https://oauth2:${TOKEN}@${SERVER#https://}/${REPO}.git" .
          if [ "$EVENT" = "pull_request" ]; then
            git checkout "$HEAD_REF"
          else
            git checkout "$REF"
          fi
          git config user.name "forgejo-actions"
          git config user.email "actions@git.szpunar.cloud"

      - name: Configure Attic
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          set -euo pipefail
          # The substituter + public key are wired system-wide via the nix-cache
          # NixOS module, so `attic use` is unnecessary here. We only
          # authenticate for pushing.
          attic login --set-default ci "$ATTIC_ENDPOINT" "$ATTIC_TOKEN"

      - name: Build changed hosts and push to cache
        run: |
          set -euo pipefail
          nix-fast-build \
            --eval-workers 1 \
            -j 4 \
            --skip-cached \
            --no-nom \
            --option fallback true \
            --attic-cache "$ATTIC_CACHE" \
            --flake ".#checks.x86_64-linux"

      - name: Cleanup
        if: always()
        run: |
          set -x
          # Defense-in-depth: scrub the temp nix.conf with the GitHub token.
          # act normally wipes $RUNNER_TEMP on job end; remove it explicitly.
          rm -f "${RUNNER_TEMP:-$HOME/.cache/runner-tmp}/nix.conf"
