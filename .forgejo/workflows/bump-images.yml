name: bump-images

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: bump-images
  cancel-in-progress: false

jobs:
  bump-images:
    runs-on: native
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: Configure Nix GitHub auth
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          : "${RUNNER_TEMP:=$HOME/.cache/runner-tmp}"
          mkdir -p "$RUNNER_TEMP"
          NIX_CONF="$RUNNER_TEMP/nix.conf"
          (umask 077; : > "$NIX_CONF")
          if [ -n "${GH_TOKEN:-}" ]; then
            printf 'access-tokens = github.com=%s\n' "$GH_TOKEN" > "$NIX_CONF"
          fi
          chmod 600 "$NIX_CONF"
          echo "NIX_USER_CONF_FILES=$NIX_CONF" >> "$GITHUB_ENV"

      - name: Checkout repository
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          GIT_CONF="$(mktemp)"
          git config -f "$GIT_CONF" --add safe.directory '*'
          export GIT_CONFIG_GLOBAL="$GIT_CONF"
          echo "GIT_CONFIG_GLOBAL=$GIT_CONF" >> "$GITHUB_ENV"
          git clone "https://oauth2:${TOKEN}@${SERVER#https://}/${REPO}.git" .
          git checkout main
          git config user.name "forgejo-actions"
          git config user.email "actions@git.szpunar.cloud"

      - name: Bump image digests
        id: bump
        env:
          REGISTRY_TOKEN_LEAH: ${{ secrets.REGISTRY_TOKEN_LEAH }}
          REGISTRY_TOKEN_NEA: ${{ secrets.REGISTRY_TOKEN_LEAH }} # TODO: get a nea token
        run: |
          set -euo pipefail
          : "${GITHUB_OUTPUT:?GITHUB_OUTPUT not set by runner}"
          OUTPUT=$(mktemp)
          # Capture CHANGED lines; bumper exits non-zero on registry failures
          # but we still want to open PRs for any images that did resolve.
          nix run .#bump-images 2>&1 | tee "$OUTPUT" || true
          CHANGED_COUNT=$(grep -c '^CHANGED' "$OUTPUT" || true)
          echo "changed_count=$CHANGED_COUNT" >> "$GITHUB_OUTPUT"
          # Save the CHANGED lines for the per-image PR step.
          cp "$OUTPUT" "$RUNNER_TEMP/bump-output.txt"
          rm -f "$OUTPUT"

      - name: Open one PR per changed image
        if: steps.bump.outputs.changed_count != '0'
        env:
          PR_TOKEN: ${{ secrets.PR_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          API_BASE="${SERVER#https://}"
          API_URL="https://${API_BASE}/api/v1/repos/${REPO}"
          # Repo owner for the PR head field — Forgejo needs "owner:branch"
          # (not just "branch") to properly link same-repo PRs. Without it,
          # the PR shows "broken due to missing fork information" in the UI.
          REPO_OWNER="${REPO%%/*}"

          while IFS=$'\t' read -r _ key oldDigest newDigest bodyJson; do
            # Slugify: replace [/:] with - for git branch names.
            slug=$(printf '%s' "$key" | sed 's#[/:]#-#g')
            branch="images/bump-${slug}"

            # Check if branch already exists (dedupe: reuse branch, existing PR auto-updates).
            BRANCH_EXISTS=$(curl -fsSL -o /dev/null -w '%{http_code}' \
              -H "Authorization: token $PR_TOKEN" \
              "$API_URL/branches/$branch" 2>/dev/null || true)

            # If the branch already exists, check whether it already contains
            # the target digest. The bumper compares against main's images.json,
            # so while a bump PR is open (unmerged) main still has the old digest
            # and every run would re-detect the same "change". Skip commit/push
            # entirely if the remote branch already has this digest.
            if [ "$BRANCH_EXISTS" = "200" ]; then
              git fetch origin "$branch" --quiet
              BRANCH_DIGEST=$(git show "origin/$branch:modules/services/images.json" \
                | jq -r --arg key "$key" '.[$key].digest // empty' 2>/dev/null || true)
              if [ "$BRANCH_DIGEST" = "$newDigest" ]; then
                echo "Skipping $key — branch $branch already at $newDigest"
                continue
              fi
            fi

            # Start from a clean main for each key.
            git checkout main
            git checkout -B "$branch"
            # Reset working-tree images.json to main's committed version —
            # the bumper wrote ALL digests into the dirty working tree, but
            # each branch must contain only this key's change.
            git checkout main -- modules/services/images.json

            jq --arg key "$key" --arg digest "$newDigest" \
              '.[$key].digest = $digest' \
              modules/services/images.json > modules/services/images.json.tmp
            mv modules/services/images.json.tmp modules/services/images.json

            git add modules/services/images.json
            git commit -m "chore(images): bump ${key}" -m "${oldDigest} -> ${newDigest}"

            # Force-push under PR_TOKEN (not the clone URL's GITHUB_TOKEN)
            # so the push actor triggers pull_request events for nix-build-pr.yml.
            git push -f "https://oauth2:${PR_TOKEN}@${API_BASE}/${REPO}.git" "HEAD:${branch}"

            # Only open a PR if the branch didn't already exist
            # (existing branch → existing PR auto-updates from the force-push).
            if [ "$BRANCH_EXISTS" != "200" ]; then
              # Wait for Forgejo to register the pushed branch in its database.
              # The branch-push hook runs asynchronously; if we create the PR
              # before it completes, Forgejo can't resolve the head ref and the
              # PR shows "broken due to missing fork information" until the
              # hook finishes (self-fixes after a few minutes, but the PR is
              # unusable in the interim).
              for i in 1 2 3 4 5; do
                CODE=$(curl -fsSL -o /dev/null -w '%{http_code}' \
                  -H "Authorization: token $PR_TOKEN" \
                  "$API_URL/branches/$branch" 2>/dev/null || true)
                [ "$CODE" = "200" ] && break
                echo "Branch not yet registered (HTTP $CODE), retrying in 3s…"
                sleep 3
              done
              PR_BODY=$(printf '%s' "$bodyJson" | jq -r '.')
              curl -fsSL -X POST \
                -H "Authorization: token $PR_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg head "${REPO_OWNER}:${branch}" --arg title "chore(images): bump ${key}" --arg body "$PR_BODY" \
                  '{head: $head, base: "main", title: $title, body: $body}')" \
                "$API_URL/pulls" > /dev/null
              echo "Opened PR for $key (branch $branch)"
            else
              # Update the existing PR's body with new metadata.
              # Forgejo's /pulls endpoint has no `head` query param (that's
              # GitHub-only) — it's ignored and ALL open PRs are returned, so
              # `.[0].number` resolves to an arbitrary PR. Filter client-side
              # by .head.ref to find the correct PR for this branch.
              PR_BODY=$(printf '%s' "$bodyJson" | jq -r '.')
              PR_NUM=$(curl -fsSL \
                -H "Authorization: token $PR_TOKEN" \
                "$API_URL/pulls?state=open&limit=1000" 2>/dev/null \
                | jq -r --arg b "$branch" 'map(select(.head.ref==$b))[0].number // empty')
              if [ -n "$PR_NUM" ]; then
                curl -fsSL -X PATCH \
                  -H "Authorization: token $PR_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n --arg body "$PR_BODY" '{body: $body}')" \
                  "$API_URL/pulls/$PR_NUM" > /dev/null
                echo "Updated existing PR #$PR_NUM for $key (branch $branch)"
              else
                echo "WARN: no open PR found for branch $branch — body not updated"
              fi
            fi

            # Return to main for the next key.
            git checkout main
          done < <(grep '^CHANGED' "$RUNNER_TEMP/bump-output.txt")

      - name: Cleanup
        if: always()
        run: |
          rm -f "${RUNNER_TEMP:-$HOME/.cache/runner-tmp}/nix.conf" \
                "${RUNNER_TEMP:-$HOME/.cache/runner-tmp}/bump-output.txt" \
                "${GIT_CONFIG_GLOBAL:-}"
