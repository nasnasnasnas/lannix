name: nix-binary-cache

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  # When someone commits a new flake.lock, build + cache immediately so
  # hosts are ready to deploy without waiting for the next scheduled run.
  push:
    branches: [main]
    paths:
      - "flake.lock"

concurrency:
  group: nix-binary-cache
  cancel-in-progress: false

env:
  ATTIC_ENDPOINT: "https://attic.szpunar.cloud/"
  ATTIC_CACHE: "lannix"

jobs:
  build-and-cache:
    runs-on: native
    timeout-minutes: 360
    defaults:
      run:
        shell: bash
    steps:
      - name: Configure Nix GitHub auth
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          # Write the GitHub access token to a temp nix.conf that only the update
          # and build steps read (via NIX_USER_CONF_FILES), so the secret is gone
          # when the job ends and never lands in the persistent runner HOME.
          : "${RUNNER_TEMP:=$HOME/.cache/runner-tmp}"
          mkdir -p "$RUNNER_TEMP"
          NIX_CONF="$RUNNER_TEMP/nix.conf"
          (umask 077; : > "$NIX_CONF")
          if [ -n "${GH_TOKEN:-}" ]; then
            printf 'access-tokens = github.com=%s\n' "$GH_TOKEN" > "$NIX_CONF"
          fi
          chmod 600 "$NIX_CONF"
          echo "NIX_USER_CONF_FILES=$NIX_CONF" >> "$GITHUB_ENV"

      - name: Checkout repository
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory '*'
          git clone "https://oauth2:${TOKEN}@${SERVER#https://}/${REPO}.git" .
          git checkout "$REF"
          git config user.name "forgejo-actions"
          git config user.email "actions@git.szpunar.cloud"

      - name: Configure Attic
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          set -euo pipefail
          # The substituter + public key are wired system-wide via the nix-cache
          # NixOS module (Phase 3), so `attic use` is unnecessary here. We only
          # authenticate for pushing.
          attic login --set-default ci "$ATTIC_ENDPOINT" "$ATTIC_TOKEN"

      - name: Update flake inputs
        id: update
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          # GITHUB_OUTPUT is required: the build/push steps read steps.update.outputs.changed.
          # If it's missing, fail loudly rather than silently skipping the build.
          : "${GITHUB_OUTPUT:?GITHUB_OUTPUT not set by runner}"
          # GITHUB_STEP_SUMMARY is optional: fall back to /dev/null if absent.
          SUMMARY_FILE="${GITHUB_STEP_SUMMARY:-/dev/null}"
          # RUNNER_TEMP may be unset under host-mode act; provide a writable fallback
          # since the commit-body/summary rendering below stages temp files there.
          : "${RUNNER_TEMP:=$HOME/.cache/runner-tmp}"
          mkdir -p "$RUNNER_TEMP"
          if [ "${{ github.event_name }}" = "push" ]; then
            # Triggered by a flake.lock commit — the lock is already current.
            # No update or local commit needed; build + cache directly.
            # Skip our own scheduled pushes to avoid a redundant rebuild of the
            # same set we just built + pushed. Inspect the commit author email
            # (github.actor may resolve to the token/runner, not the committer).
            COMMIT_AUTHOR=$(git log -1 --format=%ae)
            if [ "$COMMIT_AUTHOR" = "actions@git.szpunar.cloud" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "## Skipped: CI's own flake.lock push" >> "$SUMMARY_FILE"
              echo "" >> "$SUMMARY_FILE"
              echo "_Triggered by a scheduled CI push — already built. No rebuild._" >> "$SUMMARY_FILE"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "## Build triggered by flake.lock push" >> "$SUMMARY_FILE"
              echo "" >> "$SUMMARY_FILE"
              echo "_The lock was committed externally — no \`nix flake update\` run._" >> "$SUMMARY_FILE"
            fi
          else
            cp flake.lock flake.lock.before
            nix flake update
            if git diff --quiet -- flake.lock; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "flake.lock unchanged; nothing to build." >> "$SUMMARY_FILE"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"

              # Extract changed inputs ONCE into TSV, shared by the commit body and
              # the job summary. Columns:
              #   kind <TAB> name <TAB> owner <TAB> repo <TAB> old_id <TAB> new_id
              # For github inputs old_id/new_id are full revs (owner/repo set);
              # for others they are rev // narHash[0:16] // lastModified (owner/repo empty).
              CHANGES_TSV="$RUNNER_TEMP/lock-changes.tsv"
              {
                jq -r -n --slurpfile old flake.lock.before --slurpfile new flake.lock '
                  ($new[0].nodes) as $newn | ($old[0].nodes) as $oldn
                  | $newn | to_entries[]
                  | select(.value.locked != null)
                  | select(.value.locked.type == "github")
                  | .key as $name | .value.locked as $locked
                  | select($locked != ($oldn[$name].locked // null))
                  | ($oldn[$name].locked.rev // "-") as $oldrev
                  | ["github", $name, $locked.owner, $locked.repo, $oldrev, $locked.rev]
                  | @tsv
                '
                jq -r -n --slurpfile old flake.lock.before --slurpfile new flake.lock '
                  def ident(l): (l.rev // (l.narHash[0:16]) // (l.lastModified|tostring) // "-");
                  ($new[0].nodes) as $newn | ($old[0].nodes) as $oldn
                  | $newn | to_entries[]
                  | select(.value.locked != null)
                  | select(.value.locked.type != "github")
                  | .key as $name | .value.locked as $locked
                  | select($locked != ($oldn[$name].locked // null))
                  | ($oldn[$name].locked) as $oldl
                  | ["other", $name, "", "", ident($oldl), ident($locked)]
                  | @tsv
                '
              } > "$CHANGES_TSV"

              # Resolve a one-line commit subject for each changed github input
              # (cached per row so we hit the GitHub API at most once each).
              COMMIT_BODY="$RUNNER_TEMP/lock-commit-body.txt"
              : > "$COMMIT_BODY"
              SUMMARY_TBL="$RUNNER_TEMP/lock-summary-rows.txt"
              : > "$SUMMARY_TBL"
              while IFS=$'\t' read -r kind name owner repo oldid newid; do
                short_old="${oldid:0:7}"
                short_new="${newid:0:7}"
                subject=""
                if [ "$kind" = "github" ] && [ -n "${GH_TOKEN:-}" ] && [ -n "$newid" ]; then
                  subject=$(curl -fsSL -H "Authorization: token $GH_TOKEN" \
                    "https://api.github.com/repos/$owner/$repo/commits/$newid" \
                    2>/dev/null | jq -r '.commit.message | split("\n")[0]' 2>/dev/null || true)
                fi
                if [ "$kind" = "other" ]; then
                  subject="(non-github)"
                fi
                subject="${subject:-<unable to fetch>}"
                # Plain-text body line (commit messages are not Markdown-rendered).
                printf -- '- %s: %s -> %s - %s\n' \
                  "$name" "$short_old" "$short_new" "$subject" >> "$COMMIT_BODY"
                # Markdown row for the job summary (escape pipes).
                printf -- '| `%s` | `%s` | `%s` | %s |\n' \
                  "$name" "$short_old" "$short_new" "${subject//|/\\|}" >> "$SUMMARY_TBL"
              done < "$CHANGES_TSV"

              # Commit locally so the build evaluates a clean (non-dirty) git tree;
              # pushed only after a successful build. The body lists every changed input.
              {
                echo "chore(ci): nix flake update"
                echo ""
                cat "$COMMIT_BODY"
              } | git commit -F - -- flake.lock

              # Mirror the change list to the job summary as a Markdown table.
              {
                echo "## Flake inputs updated"
                echo ""
                echo "| input | old | new | commit |"
                echo "|---|---|---|---|"
                cat "$SUMMARY_TBL"
                echo ""
                echo "_Commit subjects fetched from GitHub; short revs shown._"
              } >> "$SUMMARY_FILE"

              rm -f "$CHANGES_TSV" "$COMMIT_BODY" "$SUMMARY_TBL"
            fi
          fi
          rm -f flake.lock.before

      - name: Build all hosts and push to cache
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail
          nix-fast-build \
            --eval-workers 1 \
            -j 4 \
            --skip-cached \
            --no-nom \
            --option fallback true \
            --attic-cache "$ATTIC_CACHE" \
            --flake ".#checks.x86_64-linux"

      - name: Push updated flake.lock
        if: steps.update.outputs.changed == 'true' && github.event_name != 'push'
        env:
          REF: ${{ github.ref_name }}
        run: git push origin "HEAD:${REF}"

      - name: Cleanup
        if: always()
        run: |
          set -x
          # Defense-in-depth: scrub the temp nix.conf containing the GitHub token.
          # act normally wipes $RUNNER_TEMP on job end, but remove explicitly.
          rm -f "${RUNNER_TEMP:-$HOME/.cache/runner-tmp}/nix.conf"