name: nix-binary-cache

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: nix-binary-cache
  cancel-in-progress: false

env:
  NIX_CONFIG: |
    experimental-features = nix-command flakes
    accept-flake-config = true
    sandbox = false
    build-users-group =
  ATTIC_ENDPOINT: "https://attic.szpunar.cloud/"
  ATTIC_CACHE: "lannix"

jobs:
  build-and-cache:
    runs-on: node-22
    timeout-minutes: 360
    defaults:
      run:
        shell: bash
    steps:
      - name: Install Nix
        run: |
          set -euo pipefail
          export USER=root
          mkdir -m 0755 -p /nix && chown root /nix
          curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon --no-channel-add
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
          echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"

      - name: Install tooling
        run: nix profile install nixpkgs#attic-client nixpkgs#nix-fast-build

      - name: Checkout repository
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory '*'
          git clone "https://oauth2:${TOKEN}@${SERVER#https://}/${REPO}.git" .
          git checkout "$REF"
          git config user.name "forgejo-actions"
          git config user.email "actions@git.szpunar.cloud"

      - name: Configure Attic
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          set -euo pipefail
          attic login --set-default ci "$ATTIC_ENDPOINT" "$ATTIC_TOKEN"
          attic use "ci:$ATTIC_CACHE"

      - name: Update flake inputs
        id: update
        run: |
          set -euo pipefail
          nix flake update
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "flake.lock unchanged; nothing to build."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Commit locally so the build evaluates a clean (non-dirty) git tree;
            # pushed only after a successful build.
            git commit -m "chore(ci): nix flake update" -- flake.lock
          fi

      - name: Build all hosts and push to cache
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail
          nix-fast-build \
            --eval-workers 1 \
            --skip-cached \
            --no-nom \
            --attic-cache "$ATTIC_CACHE" \
            --flake ".#checks.x86_64-linux"

      - name: Push updated flake.lock
        if: steps.update.outputs.changed == 'true'
        env:
          REF: ${{ github.ref_name }}
        run: git push origin "HEAD:${REF}"
