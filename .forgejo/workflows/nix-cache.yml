name: nix-binary-cache

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: nix-binary-cache
  cancel-in-progress: false

env:
  ATTIC_ENDPOINT: "https://attic.szpunar.cloud/"
  ATTIC_CACHE: "lannix"

jobs:
  build-and-cache:
    runs-on: native
    timeout-minutes: 360
    defaults:
      run:
        shell: bash
    steps:
      - name: Authenticate Nix to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          # Let nix flake update resolve github: inputs without hitting the
          # unauthenticated API rate limit. Written to the job-user's nix.conf;
          # the system nix-daemon reads it for Github fetch auth.
          mkdir -p "$HOME/.config/nix"
          if [ -n "${GH_TOKEN:-}" ]; then
            printf 'access-tokens = github.com=%s\n' "$GH_TOKEN" >> "$HOME/.config/nix/nix.conf"
          fi

      - name: Checkout repository
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory '*'
          git clone "https://oauth2:${TOKEN}@${SERVER#https://}/${REPO}.git" .
          git checkout "$REF"
          git config user.name "forgejo-actions"
          git config user.email "actions@git.szpunar.cloud"

      - name: Configure Attic
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          set -euo pipefail
          attic login --set-default ci "$ATTIC_ENDPOINT" "$ATTIC_TOKEN"
          attic use "ci:$ATTIC_CACHE"

      - name: Update flake inputs
        id: update
        run: |
          set -euo pipefail
          nix flake update
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "flake.lock unchanged; nothing to build."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Commit locally so the build evaluates a clean (non-dirty) git tree;
            # pushed only after a successful build.
            git commit -m "chore(ci): nix flake update" -- flake.lock
          fi

      - name: Build all hosts and push to cache
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail
          nix-fast-build \
            --eval-workers 1 \
            -j 4 \
            --skip-cached \
            --no-nom \
            --attic-cache "$ATTIC_CACHE" \
            --flake ".#checks.x86_64-linux"

      - name: Push updated flake.lock
        if: steps.update.outputs.changed == 'true'
        env:
          REF: ${{ github.ref_name }}
        run: git push origin "HEAD:${REF}"